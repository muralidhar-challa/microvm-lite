<!doctype html>
<html>
<head><meta charset="utf-8"><title>busybox worker-fork test</title></head>
<body>
<pre id="out"></pre>
<script type="module">
const out = document.getElementById("out");
function log(...args) {
  console.log(...args);
  out.textContent += args.map(a => typeof a === "string" ? a : JSON.stringify(a)).join(" ") + "\n";
}
window.testLog = log;

const wasmBytes = await fetch("./busybox.wasm").then(r => r.arrayBuffer()).then(b => new Uint8Array(b));

const root = new Worker("./scripts/process-worker.bundle.js", { type: "module" });

let exitResolve = null;
root.onmessage = (ev) => {
  const msg = ev.data;
  if (msg.type === "stdout") out.textContent += msg.text;
  if (msg.type === "stderr") out.textContent += "[ERR] " + msg.text;
  if (msg.type === "exited") {
    log(`[exited code=${msg.exitCode}]`);
    if (exitResolve) { exitResolve(); exitResolve = null; }
  }
  if (msg.type === "dbg") log(msg.text);
};

function waitExit() {
  return new Promise(r => { exitResolve = r; });
}

async function run(label, argv) {
  log(`\n=== ${label} ===`);
  const t0 = performance.now();
  root.postMessage({ type: "exec", argv });
  await waitExit();
  const ms = (performance.now() - t0).toFixed(1);
  log(`[${ms} ms]`);
}

// init root worker, then trigger pool fill with an untimed warmup exec
// (pool workers need ~500ms to load+instantiate WASM before they can be forked)
root.postMessage({ type: "init", pid: 1, wasmBytes, files: { "/tmp/test.txt": new TextEncoder().encode("foo\nbar\nbaz\n") } });
await new Promise(r => setTimeout(r, 300));
root.postMessage({ type: "exec", argv: ["echo", "warmup"] });
await waitExit();
await new Promise(r => setTimeout(r, 1000)); // let pool workers finish WASM init

await run("echo hi (no sh)", ["echo", "hi"]);
await run("sh -c 'echo hi' (no pipe)", ["sh", "-c", "echo hi"]);
await run("sh -c 'cat /tmp/test.txt' (no pipe)", ["sh", "-c", "cat /tmp/test.txt"]);
await run("sh -c 'cat /tmp/test.txt | grep bar' (pipe)", ["sh", "-c", "cat /tmp/test.txt | grep bar"]);
await run("sh -c 'cat /tmp/test.txt | grep bar' (pipe, 2nd run)", ["sh", "-c", "cat /tmp/test.txt | grep bar"]);

log("\n=== done ===");
window.testDone = true;
</script>
</body>
</html>
