<!doctype html>
<html>
<head><meta charset="utf-8"><title>Phase 1 fiber selftest</title></head>
<body>
<script>
  window.Module = {
    locateFile: function (path) { return "/dist/" + path; },
    emHttpFetch: async function () { return 0; },
    emHttpLog: function (text) { console.log("[vm-dbg]", text); },
  };
  window.__fiberSelftestReady = new Promise(function (resolve) {
    window.Module.onRuntimeInitialized = function () { resolve(); };
  });
  window.__runFiberSelftest = function () {
    var rc = Module.ccall("em_fiber_selftest", "number", [], []);
    var log = Module.ccall("em_fiber_selftest_log", "string", [], []);
    return { rc: rc, log: log };
  };
</script>
<script src="/dist/blink.js"></script>
</body>
</html>
