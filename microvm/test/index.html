<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>microvm-lite — M0 spike</title>
<style>
  body { font-family: ui-monospace, monospace; background: #0d0d0d; color: #e0e0e0; margin: 0; padding: 16px; }
  #statusEl { color: #00ff88; margin-bottom: 12px; }
  #log { white-space: pre-wrap; background: #111; border: 1px solid #333; padding: 12px; min-height: 200px; }
  .cmd { color: #6cf; }
  .err { color: #f66; }
  button { margin: 4px 4px 12px 0; }
</style>
</head>
<body>
  <div id="statusEl">booting worker…</div>
  <div>
    <button onclick="run(['ls','/bin'])">ls /bin</button>
    <button onclick="run(['xtool','ping'])">xtool ping</button>
    <button onclick="run(['echo','hello from blink'])">echo</button>
  </div>
  <div id="log"></div>

<script>
  var log = document.getElementById('log');
  var statusEl = document.getElementById('statusEl');
  var worker = new Worker('worker.js');
  var pending = {};
  var nextId = 1;

  worker.onerror = function (e) {
    log.innerHTML += '<span class="err">worker error: ' + e.message + ' @ ' + e.filename + ':' + e.lineno + '</span>\n';
    statusEl.textContent = 'worker failed to load';
  };

  // M3: mock host endpoints, dispatched via the worker's proxy_request round
  // trip (same shapes as useV86.ts's registerVmEndpoint registry). Each
  // handler gets {method, path, headers, body} and returns
  // {status, statusText, headers, body}. window.vmEndpoints is swappable so
  // tests can install their own mocks.
  var llmCalls = [];
  window.llmCalls = llmCalls;
  window.vmEndpoints = {
    'llm.vm': function (req) {
      var n = llmCalls.push(JSON.parse(req.body));
      if (n === 1) {
        // first iteration: ask the runner to run its shell tool
        return { status: 200, body: JSON.stringify({
          content: [
            { type: 'text', text: 'Let me check.' },
            // A SIMPLE command: exercises the full HTTP round-trip through the
            // runner's run_shell tool. A pipeline here (echo|tr) hits the known
            // M2 limitation — output of a pipeline captured across a Rust
            // Command (probe spawnsh) is lost — which is a fork/fd issue, not
            // an HTTP-bridge one. See project_microvm_backend memory.
            { type: 'tool_use', id: 'tu_1', name: 'run_shell',
              input: { command: 'echo hello-from-tool' } },
          ],
          stop_reason: 'tool_use',
        }) };
      }
      // second iteration: end the loop, echoing what the tool returned
      var toolResult = '';
      try {
        var msgs = llmCalls[n - 1].messages;
        toolResult = msgs[msgs.length - 1].content[0].content.trim();
      } catch (e) {}
      return { status: 200, body: JSON.stringify({
        content: [{ type: 'text', text: 'TOOL_SAID:' + toolResult }],
        stop_reason: 'end_turn',
      }) };
    },
    'api.vm': function (req) {
      if (req.path === '/ListQueries') {
        return { status: 200, body: JSON.stringify({
          queries: [{ query_id: 42, name: 'Mock Query', description: 'from the M3 mock' }],
          total: 1,
        }) };
      }
      return { status: 200, body: JSON.stringify({ ok: true, path: req.path }) };
    },
    'done.vm': function (req) {
      window.doneCallback = JSON.parse(req.body);
      return { status: 200, body: '{"ok":true}' };
    },
  };

  worker.onmessage = function (ev) {
    var msg = ev.data;
    if (msg.type === 'proxy_request') {
      var handler = window.vmEndpoints[msg.hostname];
      var resp;
      try {
        resp = handler ? handler(msg) : { status: 404, statusText: 'Not Found', body: 'no endpoint for ' + msg.hostname };
      } catch (e) {
        resp = { status: 500, statusText: 'Internal Server Error', body: String(e) };
      }
      log.textContent += '[proxy] ' + msg.method + ' ' + msg.hostname + msg.path + ' -> ' + resp.status + '\n';
      worker.postMessage({ type: 'proxy_response', id: msg.id, status: resp.status,
                           statusText: resp.statusText, headers: resp.headers, body: resp.body });
      return;
    }
    log.textContent += '[recv:' + msg.type + '] ';
    if (msg.type === 'ready') { statusEl.textContent = 'ready'; return; }
    if (msg.type === 'dbg') { log.textContent += '[dbg] ' + msg.text + '\n'; return; }
    if (msg.type === 'result') {
      var p = pending[msg.id];
      delete pending[msg.id];
      if (msg.error) log.innerHTML += '<span class="err">error: ' + msg.error + '</span>\n';
      log.textContent += msg.output;
      if (p) p(msg);
    }
  };

  function run(argv) {
    var id = nextId++;
    log.innerHTML += '<span class="cmd">$ ' + argv.join(' ') + '</span>\n';
    return new Promise(function (resolve) {
      pending[id] = resolve;
      worker.postMessage({ type: 'exec', id: id, argv: argv });
    });
  }
  window.run = run;
</script>
</body>
</html>
